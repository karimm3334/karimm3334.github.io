<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="3D LiDAR point-cloud scan">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101720"/>
      <stop offset="1" stop-color="#0a0d12"/>
    </linearGradient>
    <radialGradient id="scan2" cx="0.18" cy="0.85" r="0.9">
      <stop offset="0" stop-color="#e08a53" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#e08a53" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg2)"/>
  <rect width="1600" height="900" fill="url(#scan2)"/>

  <!-- LiDAR scan rings from sensor origin (lower-left) -->
  <g fill="none" stroke="#e08a53" stroke-opacity="0.35" stroke-width="2">
    <path d="M290 780 A420 420 0 0 1 710 360"/>
    <path d="M290 780 A600 600 0 0 1 890 300"/>
    <path d="M290 780 A780 780 0 0 1 1070 250"/>
  </g>
  <circle cx="290" cy="780" r="10" fill="#e8eaee"/>

  <!-- point cloud returns -->
  <g fill="#edb488">
    <circle cx="620" cy="420" r="5"/><circle cx="660" cy="440" r="4"/><circle cx="700" cy="415" r="5"/>
    <circle cx="740" cy="452" r="4"/><circle cx="790" cy="430" r="6"/><circle cx="835" cy="470" r="4"/>
    <circle cx="880" cy="440" r="5"/><circle cx="930" cy="485" r="4"/><circle cx="980" cy="455" r="6"/>
    <circle cx="1030" cy="500" r="4"/><circle cx="1090" cy="470" r="5"/><circle cx="1150" cy="515" r="4"/>
    <circle cx="1205" cy="486" r="6"/><circle cx="1265" cy="530" r="4"/><circle cx="1320" cy="500" r="5"/>
  </g>
  <g fill="#e08a53" fill-opacity="0.75">
    <circle cx="600" cy="560" r="4"/><circle cx="680" cy="600" r="4"/><circle cx="770" cy="580" r="5"/>
    <circle cx="860" cy="620" r="4"/><circle cx="950" cy="600" r="5"/><circle cx="1050" cy="640" r="4"/>
    <circle cx="1140" cy="615" r="5"/><circle cx="1240" cy="655" r="4"/><circle cx="1330" cy="628" r="5"/>
  </g>
  <g fill="#cfd4db" fill-opacity="0.5">
    <circle cx="700" cy="300" r="4"/><circle cx="820" cy="280" r="4"/><circle cx="940" cy="300" r="4"/>
    <circle cx="1060" cy="285" r="4"/><circle cx="1180" cy="305" r="4"/>
  </g>

</svg>
