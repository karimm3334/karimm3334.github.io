<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Depth-camera object-detection motif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111620"/>
      <stop offset="1" stop-color="#0a0d12"/>
    </linearGradient>
    <linearGradient id="depth4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e08a53" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2b6df0" stop-opacity="0.10"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg4)"/>
  <rect width="1600" height="900" fill="url(#depth4)"/>

  <!-- depth "contours" -->
  <g fill="none" stroke="#28313b" stroke-width="2">
    <ellipse cx="820" cy="450" rx="520" ry="300"/>
    <ellipse cx="820" cy="450" rx="380" ry="215"/>
    <ellipse cx="820" cy="450" rx="240" ry="135"/>
  </g>

  <!-- detected object bounding boxes -->
  <g fill="none" stroke="#e08a53" stroke-width="4">
    <rect x="470" y="360" width="240" height="270" rx="6"/>
    <rect x="900" y="300" width="300" height="360" rx="6"/>
  </g>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="22" fill="#0b0e13">
    <rect x="470" y="326" width="150" height="34" fill="#e08a53"/>
    <text x="482" y="350">object 0.98</text>
    <rect x="900" y="266" width="150" height="34" fill="#e08a53"/>
    <text x="912" y="290">object 0.91</text>
  </g>

  <!-- feature keypoints -->
  <g stroke="#edb488" stroke-width="2">
    <path d="M560 420 h20 M570 410 v20"/><path d="M640 500 h20 M650 490 v20"/>
    <path d="M1000 400 h20 M1010 390 v20"/><path d="M1090 540 h20 M1100 530 v20"/>
    <path d="M980 560 h20 M990 550 v20"/>
  </g>

</svg>
